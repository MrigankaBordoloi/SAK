<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — NEF College, Guwahati</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/output.css">
</head>
<body data-nav="contact">

<div data-include="/partials/header.html"></div>

<section class="pagebanner">
  <div class="wrap">
    <div class="crumbs"><a href="/index.html">Home</a> / Contact</div>
    <h2>Contact Us</h2>
  </div>
</section>
<div class="weave weave--thin"></div>

<section class="py-16">
  <div class="wrap grid grid-cols-1 md:grid-cols-2 gap-9">
    <div class="card p-6">
      <h3 class="mb-3.5">Reach the college</h3>
      <dl>
        <div class="flex gap-3 py-2.5 border-b border-line text-[14.5px]"><dt class="font-semibold min-w-[96px] text-primary">Address</dt><dd>NEF College, Lokhra, Guwahati, Assam</dd></div>
        <div class="flex gap-3 py-2.5 border-b border-line text-[14.5px]"><dt class="font-semibold min-w-[96px] text-primary">Email</dt><dd>nefcollege1@gmail.com</dd></div>
        <div class="flex gap-3 py-2.5 border-b border-line text-[14.5px]"><dt class="font-semibold min-w-[96px] text-primary">Phone</dt><dd>+91 94011 16666 · +91 96131 34422</dd></div>
        <div class="flex gap-3 py-2.5 border-b border-line text-[14.5px]"><dt class="font-semibold min-w-[96px] text-primary">Office hours</dt><dd>Mon–Sat, 10:00 AM – 4:00 PM</dd></div>
      </dl>
      <div class="mt-5.5 mt-[22px] h-[200px] rounded grid place-items-center text-primary text-[13px] bg-gradient-to-br from-[#DDE5EF] to-[#B9C6D8]">MAP EMBED — Lokhra, Guwahati</div>
    </div>
    <div class="card p-6">
      <h3 class="mb-3.5">Send an enquiry</h3>
      <form>
        <label class="block text-[13.5px] font-semibold mt-3.5 mb-1.5" for="n">Full name</label>
        <input class="w-full px-3.5 py-2.5 border border-line rounded-lg text-[14.5px] bg-paper focus:outline focus:outline-2 focus:outline-accent focus:border-accent" id="n" type="text" placeholder="Your name">
        <label class="block text-[13.5px] font-semibold mt-3.5 mb-1.5" for="e">Email</label>
        <input class="w-full px-3.5 py-2.5 border border-line rounded-lg text-[14.5px] bg-paper focus:outline focus:outline-2 focus:outline-accent focus:border-accent" id="e" type="email" placeholder="you@example.com">
        <label class="block text-[13.5px] font-semibold mt-3.5 mb-1.5" for="c">Course of interest</label>
        <select class="w-full px-3.5 py-2.5 border border-line rounded-lg text-[14.5px] bg-paper" id="c">
          <option>B.A.</option><option>B.Com.</option><option>B.B.A.</option>
          <option>B.C.A.</option><option>B.S.W.</option><option>M.B.A.</option>
          <option>M.S.W.</option><option>M.Com.</option><option>M.A. Sociology</option>
        </select>
        <label class="block text-[13.5px] font-semibold mt-3.5 mb-1.5" for="m">Message</label>
        <textarea class="w-full px-3.5 py-2.5 border border-line rounded-lg text-[14.5px] bg-paper focus:outline focus:outline-2 focus:outline-accent focus:border-accent" id="m" rows="4" placeholder="How can we help?"></textarea>
        <button class="btn-primary mt-4 border-none cursor-pointer" type="submit">Send enquiry</button>
      </form>
    </div>
  </div>
</section>

<div data-include="/partials/footer.html"></div>
<script src="/assets/js/include.js"></script>
</body>
</html>
